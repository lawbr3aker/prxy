name: Server Proxy

on:
  workflow_dispatch:
    inputs:
      timeout:
        description: 'How long to keep alive (minutes)'
        required: false
        default: '30'

jobs:
  serve:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq
          sudo apt-get install -y ngrok

      - name: Authenticate ngrok
        run: ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}

      - name: Start server proxy
        run: python server_main.py &
        env:
          GAS_URL: ${{ secrets.GAS_URL }}

      - name: Wait for server to be ready
        run: sleep 3

      - name: Start ngrok tunnel
        run: ngrok http 8888 --log=stdout --log-format=json > /tmp/ngrok.log &

      - name: Wait for ngrok to connect
        run: |
          for i in $(seq 1 15); do
            URL=$(curl -s http://127.0.0.1:4040/api/tunnels \
              | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    tunnels = data.get('tunnels', [])
    if tunnels:
        print(tunnels[0]['public_url'])
except:
    pass
")
            if [ -n "$URL" ]; then
              echo "NGROK_URL=$URL" >> $GITHUB_ENV
              break
            fi
            sleep 2
          done

      - name: Show tunnel URL
        run: |
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║         Server Proxy is live             ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  $NGROK_URL"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "Proxy URL: $NGROK_URL" >> $GITHUB_STEP_SUMMARY

      - name: Keep alive
        run: |
          MINUTES=${{ github.event.inputs.timeout }}
          echo "Keeping alive for $MINUTES minute(s)..."
          sleep $(( MINUTES * 60 ))